<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Làm bài</title>

  <style>
  :root {
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #0f172a;
    --primary: #2563eb;
    --success: #16a34a;
    --danger: #dc2626;
    --warning: #f59e0b;
    --info: #0ea5e9;
    --shadow: rgba(0, 0, 0, 0.1);
  }

    body.dark {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #ffffff;
      --shadow: rgba(0, 0, 0, 0.4);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s ease;
    }

    .quiz-container {
      display: flex;
      min-height: 100vh;
      gap: 20px;
      padding: 20px;
    }

    /* MAIN */
    .main {
      flex: 3;
      background: var(--card);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 25px var(--shadow);
    }

    /* SIDEBAR */
    .sidebar {
      flex: 1;
      background: var(--card);
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 8px 25px var(--shadow);
    }

    /* Câu hỏi */
    #questionText {
      margin-bottom: 20px;
    }

    .option {
      background: var(--bg);
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
      border: 1px solid transparent;
    }

    .option:hover {
      transform: translateY(-2px);
      border: 1px solid var(--primary);
    }

    .correct {
      background: var(--success) !important;
      color: white;
    }

    .wrong {
      background: var(--danger) !important;
      color: white;
    }

    .nav-buttons {
      margin-top: 20px;
    }

    button {
      margin: 4px;
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    .btn-prev { background: #64748b; }
    .btn-next { background: var(--primary); }
    .btn-finish { background: var(--warning); }
    .btn-home { background: var(--info); }

    #timer {
      margin-bottom: 20px;
      font-weight: bold;
    }

    .result-box {
      margin-top: 20px;
      padding: 20px;
      background: var(--bg);
      border-radius: 14px;
      box-shadow: 0 4px 12px var(--shadow);
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--card);
      border: none;
      padding: 8px 12px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 4px 10px var(--shadow);
    }

    @media (max-width: 900px) {
      .quiz-container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<div class="quiz-container">
  <div class="main">
    <h2 id="questionTitle"></h2>
    <p id="questionText"></p>
    <div id="options"></div>

    <div class="nav-buttons">
      <button class="btn-prev" onclick="prevQuestion()">⬅ Quay lại</button>
      <button class="btn-next" onclick="nextQuestion()">Tiếp tục ➡</button>
      <button class="btn-finish" onclick="finishExam()">Kết thúc bài</button>
      <button class="btn-home" onclick="goHome()">Trang chủ</button>
    </div>

    <div id="result"></div>
  </div>

  <div class="sidebar">
    <div id="timer"></div>
    <div id="navigator"></div>
    <button onclick="retryWrong()" style="background-color: #f97316; color: white;">🔁 Làm lại câu sai</button>
    <button onclick="shuffleQuestions()" style="background-color: #8b5cf6; color: white;"> 🔀 Xáo trộn câu hỏi </button>
    <button onclick="restoreOriginal()" style="background-color: #64748b; color: white;">📘 Trở về đề gốc</button>
    <button onclick="shuffleAnswers()" style="background-color: #0ea5e9; color: white;">🔀 Xáo trộn đáp án</button>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const examId = urlParams.get("exam");

  const storedExam = JSON.parse(localStorage.getItem(examId));

  if (!storedExam) {
    alert("Không tìm thấy đề!");
    window.location.href = "index.html";
  }

  let originalQuestions = JSON.parse(JSON.stringify(storedExam.questions));
  let questions = JSON.parse(JSON.stringify(storedExam.questions));
  let current = 0;
  let answers = {};
  let time = 0;
  let finished = false;

  const questionTitle = document.getElementById("questionTitle");
  const questionText = document.getElementById("questionText");
  const optionsDiv = document.getElementById("options");
  const navigatorDiv = document.getElementById("navigator");
  const timerDiv = document.getElementById("timer");
  const resultDiv = document.getElementById("result");
  window.onload = function() {
    renderQuestion();
  };

  setInterval(() => {
    if (!finished) { 
      time++;
      timerDiv.innerText = "Thời gian: " + time + "s";
    }
  }, 1000);

  function toggleTheme() {
    document.body.classList.toggle("dark");
    const btn = document.querySelector(".theme-toggle");
    if (document.body.classList.contains("dark")) {
      btn.innerText = "☀";
      localStorage.setItem("theme", "dark");
    } else {
      btn.innerText = "🌙";
      localStorage.setItem("theme", "light");
    }
  }

  if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
    if(document.querySelector(".theme-toggle")) 
      document.querySelector(".theme-toggle").innerText = "☀";
  }

  function renderQuestion() {
    const q = questions[current];
    if (!q) return;

    questionTitle.innerText = "Câu " + (current + 1);
    questionText.innerText = q.text;
    optionsDiv.innerHTML = "";

    Object.entries(q.options).forEach(([key, value]) => {
      const btn = document.createElement("div");
      btn.innerText = key + ". " + value;
      btn.className = "option";
      btn.onclick = () => selectAnswer(key);

      if (answers[current]) {
        if (key === q.correct) {
          btn.classList.add("correct");
        } else if (answers[current] === key) {
          btn.classList.add("wrong");
        }
      }
      optionsDiv.appendChild(btn);
    });

    renderNavigator();
  }

  function selectAnswer(key) {
    if (finished) return;

    if (answers[current]) return;

    answers[current] = key;
    renderQuestion();

    const answeredCount = Object.keys(answers).length;
    if (answeredCount === questions.length) {
      setTimeout(() => { finishExam(); }, 500);
      return;
    }

    setTimeout(() => {
      if (current < questions.length - 1) {
        current++;
        renderQuestion();
      }
    }, 400);
  }

  function nextQuestion() {
    if (current < questions.length - 1) {
      current++;
      renderQuestion();
    }
  }

  function prevQuestion() {
    if (current > 0) {
      current--;
      renderQuestion();
    }
  }

  function renderNavigator() {
    navigatorDiv.innerHTML = "";

    questions.forEach((_, i) => {
      const btn = document.createElement("button");
      btn.innerText = i + 1;

    
      btn.style.color = "white";     
      btn.style.background = "#64748b"; 
      btn.style.padding = "8px";
      btn.style.margin = "2px";
      btn.style.border = "none";
      btn.style.borderRadius = "4px";
      btn.style.cursor = "pointer";

      if (i === current) {
          btn.style.boxShadow = "0 0 0 3px #f59e0b"; 
      }

      if (answers[i]) {
        btn.style.background =
          answers[i] === questions[i].correct
            ? "green"
            : "red";
      }

      btn.onclick = () => {
        current = i;
        renderQuestion();
      };

      navigatorDiv.appendChild(btn);
    });
  }

  function finishExam() {
    finished = true;
    let correct = 0; let wrong = 0; let unanswered = 0;
    questions.forEach((q, i) => {
      if (!answers[i]) { unanswered++; } 
      else if (answers[i] === q.correct) { correct++; } 
      else { wrong++; }
    });

    const percent = ((correct / questions.length) * 100).toFixed(1);
    resultDiv.innerHTML = `
      <div class="result-box">
        <h3>📊 KẾT QUẢ BÀI THI</h3>
        <p>✅ Số câu đúng: <strong>${correct}</strong></p>
        <p>❌ Số câu sai: <strong>${wrong}</strong></p>
        <p>⚠️ Chưa làm: <strong>${unanswered}</strong></p>
        <p>🎯 Tỷ lệ đúng: <strong>${percent}%</strong></p>
        <p>⏱ Thời gian làm bài: <strong>${time}s</strong></p>
        <button onclick="redoWrong()" style="background:#f97316">🔁 Làm lại câu sai</button>
        <button onclick="restartFullExam()" style="background:#ef4444">🔄 Làm lại toàn bộ bài</button>
      </div>
    `;
  }

  function continueExam() {
    finished = false;
    resultDiv.innerHTML = "";
    for (let i = 0; i < questions.length; i++) {
      if (!answers[i]) {
        current = i;
        renderQuestion();
        return;
      }
    }
    alert("Bạn đã làm hết tất cả câu hỏi!");
  }

  function restartExam() {
      answers = {}; current = 0; time = 0;
      resultDiv.innerHTML = "";
      renderQuestion();
    }

    function retryWrong() {
      questions = questions.filter((_, i) => answers[i] !== storedExam.questions[i].correct);
      answers = {}; current = 0;
      resultDiv.innerHTML = "";
      renderQuestion();
    }

    function goHome() { window.location.href = "index.html"; }

    function redoWrong() {
      finished = false;
      questions = originalQuestions.filter((q, i) => { return answers[i] !== q.correct; });
      answers = {}; current = 0;
      resultDiv.innerHTML = "";
      if (questions.length === 0) {
        alert("Không có câu sai để làm lại 🎉");
        return;
      }
      renderQuestion();
    }

    function restartFullExam() {
      finished = false;
      questions = [...originalQuestions];
      answers = {}; current = 0; time = 0;
      resultDiv.innerHTML = "";
      renderQuestion();
    }

    function shuffleQuestions() {
      if (finished) { alert("Không thể xáo trộn khi đã kết thúc bài!"); return; }
      for (let i = questions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [questions[i], questions[j]] = [questions[j], questions[i]];
      }
      current = 0; answers = {}; resultDiv.innerHTML = "";
      renderQuestion();
      alert("Đã xáo trộn câu hỏi 🔀");
    }

    function restoreOriginal() {
      if (finished) { alert("Không thể đổi đề khi đã kết thúc!"); return; }
      questions = JSON.parse(JSON.stringify(originalQuestions));
      answers = {}; current = 0; resultDiv.innerHTML = "";
      renderQuestion();
      alert("Đã khôi phục đề gốc 📘");
    }

    function shuffleAnswers() {
      if (finished) { alert("Không thể xáo trộn khi đã kết thúc bài!"); return; }
      questions.forEach(q => {
        const entries = Object.entries(q.options);
        for (let i = entries.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [entries[i], entries[j]] = [entries[j], entries[i]];
        }
        const newOptions = {};
        const keys = ["A", "B", "C", "D"];
        let newCorrect = "";
        entries.forEach((item, index) => {
          const newKey = keys[index];
          newOptions[newKey] = item[1];
          if (item[0] === q.correct) { newCorrect = newKey; }
        });
        q.options = newOptions; q.correct = newCorrect;
      });
      answers = {}; current = 0; resultDiv.innerHTML = "";
      renderQuestion();
      alert("Đã xáo trộn đáp án 🔀");
    }

    renderQuestion();
  </script>

</body>
</html>
